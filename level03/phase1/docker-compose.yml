services:
    nginx:
      image: nginx
      ports:
        - 8000:80
      volumes:
        - ./phase1/nginx/nginx.conf:/etc/nginx/nginx.conf
    
    server1:
      build: ./phase1/server
      env_file:
        - ./phase1/server/.env
      environment:
        - SERVER_NAME=first server
      ports:
        - 5001:7000

    server2:
      build: ./phase1/server
      env_file:
        - ./phase1/server/.env
      environment:
        - SERVER_NAME=second server
      ports:
        - 5002:7000

    server3:
      build: ./phase1/server
      env_file:
        - ./phase1/server/.env
      environment:
        - SERVER_NAME=third server
      ports:
        - 5003:7000
